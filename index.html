<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>∞ Infinity Store — Billing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --paper: #f5f0e8;
  --cream: #ede7d5;
  --warm: #c8a96e;
  --accent: #b85c38;
  --green: #3d7a5a;
  --light: #faf7f2;
  --border: #d4c9b0;
  --shadow: rgba(26,18,8,0.12);
  --nav-h: 56px;
  --header-h: 52px;
  --blue: #4a90d9;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); }

/* ── HEADER ── */
.app-header {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:var(--header-h);
  background:var(--ink);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 0.9rem;
  box-shadow:0 2px 14px rgba(0,0,0,0.35);
}
.logo { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--warm); line-height:1; }
.logo small { color:rgba(255,255,255,0.35); font-size:0.56rem; letter-spacing:0.2em; text-transform:uppercase; display:block; margin-top:2px; font-family:'DM Mono',monospace; }
.header-right { display:flex; align-items:center; gap:0.6rem; }
#clock { font-family:'DM Mono',monospace; font-size:0.72rem; color:rgba(255,255,255,0.45); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  height:var(--nav-h);
  background:var(--ink);
  display:flex;
  box-shadow:0 -2px 20px rgba(0,0,0,0.3);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; cursor:pointer;
  color:rgba(255,255,255,0.38); transition:color 0.2s;
  border:none; background:none; padding:6px 0; position:relative;
}
.nav-item.active { color:var(--warm); }
.nav-icon { font-size:1.15rem; }
.nav-label { font-size:0.58rem; font-family:'DM Mono',monospace; letter-spacing:0.07em; text-transform:uppercase; }
.cart-badge { position:absolute; top:5px; right:calc(50% - 18px); background:var(--accent); color:white; border-radius:10px; font-size:0.56rem; font-family:'DM Mono',monospace; padding:1px 5px; min-width:15px; text-align:center; display:none; }

/* ── PAGES ── */
.page { display:none; position:fixed; top:var(--header-h); bottom:var(--nav-h); left:0; right:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.page.active { display:block; }

/* ══════════════════════════
   BILLING PAGE
══════════════════════════ */
#page-bill {
  display:none;
  flex-direction:column;
  overflow:hidden;
  background:var(--light);
}
#page-bill.active { display:flex; }

/* Quick-add form */
.bill-form-area {
  background:white;
  border-bottom:2px solid var(--border);
  padding:0.7rem 0.8rem;
  flex-shrink:0;
}
.bill-form-title {
  font-size:0.62rem; font-family:'DM Mono',monospace; letter-spacing:0.12em;
  text-transform:uppercase; color:#aaa; margin-bottom:0.5rem;
}
.bill-main-row {
  display:flex; gap:0.4rem; align-items:stretch; margin-bottom:0.4rem;
}
.bill-name-inp {
  flex:1; padding:0.65rem 0.75rem;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:0.95rem;
  outline:none; background:var(--light); color:var(--ink);
  min-width:0;
}
.bill-name-inp:focus { border-color:var(--warm); background:white; }
.add-item-btn {
  padding:0 1rem; background:var(--ink); color:white;
  border:none; border-radius:10px; font-size:1.3rem;
  cursor:pointer; flex-shrink:0; transition:all 0.15s;
  font-weight:700; display:flex; align-items:center; justify-content:center;
}
.add-item-btn:active { background:var(--accent); transform:scale(0.95); }
.bill-num-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.4rem;
}
.num-field { display:flex; flex-direction:column; gap:2px; }
.num-label { font-size:0.6rem; font-family:'DM Mono',monospace; color:#aaa; letter-spacing:0.08em; text-transform:uppercase; }
.num-inp {
  padding:0.5rem 0.55rem; border:1.5px solid var(--border); border-radius:8px;
  font-family:'DM Mono',monospace; font-size:0.88rem; outline:none;
  background:var(--light); color:var(--ink); text-align:center;
  -webkit-appearance:none; appearance:none;
}
.num-inp:focus { border-color:var(--warm); background:white; }

/* Cart items scroll */
.cart-scroll {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  min-height:0;
}
.cart-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; gap:0.5rem; color:#ccc;
}
.cart-empty .big-icon { font-size:3.5rem; }
.cart-empty p { font-size:0.85rem; }
.cart-empty p.sub { font-size:0.72rem; color:#ddd; }

.cart-item {
  padding:0.65rem 0.85rem; border-bottom:1px solid #f0ece4;
  display:flex; align-items:center; gap:0.5rem;
  transition:background 0.1s;
}
.cart-item:nth-child(even) { background:#faf8f4; }
.ci-num { font-family:'DM Mono',monospace; font-size:0.7rem; color:#ccc; min-width:18px; text-align:right; flex-shrink:0; }
.ci-body { flex:1; min-width:0; }
.ci-name { font-size:0.85rem; font-weight:600; color:var(--ink); line-height:1.3; }
.ci-meta { font-size:0.68rem; color:#aaa; font-family:'DM Mono',monospace; margin-top:1px; }
.ci-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; flex-shrink:0; }
.ci-total { font-family:'DM Mono',monospace; font-size:0.92rem; color:var(--accent); font-weight:700; white-space:nowrap; }
.ci-disc-badge { background:#e8f5ee; color:var(--green); font-size:0.6rem; font-family:'DM Mono',monospace; padding:1px 5px; border-radius:5px; }
.ci-del { background:none; border:none; color:#ddd; font-size:0.9rem; cursor:pointer; padding:2px 4px; flex-shrink:0; }
.ci-del:active { color:#c0392b; }

/* Sticky totals + checkout footer */
.bill-footer {
  background:white;
  border-top:2px solid var(--border);
  padding:0.7rem 0.85rem 0.75rem;
  flex-shrink:0;
}
.footer-top-row {
  display:flex; gap:0.5rem; margin-bottom:0.55rem;
}
.footer-top-row input {
  flex:1; padding:0.4rem 0.55rem; border:1.5px solid var(--border);
  border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.8rem;
  outline:none; background:var(--light); min-width:0;
}
.footer-top-row input:focus { border-color:var(--blue); background:white; }
.footer-disc-row {
  display:flex; gap:0.4rem; align-items:center; margin-bottom:0.5rem;
}
.footer-disc-row input {
  flex:1; padding:0.4rem 0.5rem; border:1.5px solid var(--border);
  border-radius:8px; font-family:'DM Mono',monospace; font-size:0.8rem;
  outline:none; background:var(--light); min-width:0; text-align:center;
}
.footer-disc-row input:focus { border-color:var(--warm); background:white; }
.footer-disc-row .sep { font-size:0.72rem; color:#bbb; white-space:nowrap; }
.totals-mini { margin-bottom:0.5rem; }
.t-row { display:flex; justify-content:space-between; font-size:0.8rem; padding:0.12rem 0; color:#888; }
.t-row.disc { color:var(--green); font-size:0.76rem; }
.t-row.grand { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--ink); border-top:1.5px solid var(--border); padding-top:0.4rem; margin-top:0.2rem; }
.t-row.grand span:last-child { color:var(--accent); }

.bill-btn {
  width:100%; padding:0.9rem; background:var(--ink); color:white;
  border:none; border-radius:11px; font-family:'Playfair Display',serif;
  font-size:1.05rem; cursor:pointer; transition:all 0.2s;
  box-shadow:0 3px 14px rgba(26,18,8,0.22);
}
.bill-btn:active { background:var(--accent); transform:scale(0.98); }
.bill-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

/* ══════════════════════════
   REPORTS PAGE
══════════════════════════ */
.rep-page { background:var(--light); padding-bottom:1rem; }
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.5rem; padding:0.9rem 0.8rem 0.4rem; }
.stat-card { background:white; border-radius:12px; padding:0.85rem; border-left:4px solid var(--warm); box-shadow:0 1px 6px var(--shadow); }
.stat-card.g { border-left-color:var(--green); }
.stat-card.a { border-left-color:var(--accent); }
.stat-card.b { border-left-color:var(--blue); }
.stat-label { font-size:0.6rem; font-family:'DM Mono',monospace; letter-spacing:0.1em; text-transform:uppercase; color:#aaa; }
.stat-val { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--ink); margin-top:0.15rem; }
.history-section { padding:0 0.8rem; }
.history-title { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--ink); margin-bottom:0.45rem; opacity:0.7; }
.sale-card { background:white; border-radius:12px; padding:0.7rem 0.85rem; border:1.5px solid var(--border); margin-bottom:0.45rem; box-shadow:0 1px 6px var(--shadow); }
.sale-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.2rem; }
.sale-id { font-family:'DM Mono',monospace; font-size:0.68rem; color:#aaa; }
.sale-total-amt { font-family:'DM Mono',monospace; font-size:0.9rem; color:var(--green); font-weight:600; }
.sale-time { font-size:0.68rem; color:#aaa; }
.sale-items-list { font-size:0.74rem; color:#666; margin:0.15rem 0 0.4rem; line-height:1.4; }
.sale-reprint-btn { background:var(--cream); border:none; border-radius:6px; padding:0.28rem 0.65rem; font-size:0.7rem; cursor:pointer; }
.no-sales { text-align:center; padding:2rem; color:#ccc; font-size:0.88rem; }

/* ══════════════════════════
   MODALS
══════════════════════════ */
.modal-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.55); display:none; align-items:flex-end; justify-content:center; z-index:9999; backdrop-filter:blur(3px); }
.modal-overlay.open { display:flex !important; }
.receipt-modal { background:white; border-radius:20px 20px 0 0; padding:1rem 1rem 2rem; width:100%; max-width:520px; max-height:92vh; overflow-y:auto; animation:slideUp 0.25s ease; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 0.9rem; }

/* Receipt */
.receipt { font-family:'DM Sans',sans-serif; background:white; }
.r-header { background:var(--ink); color:white; padding:0.9rem 1.1rem; border-radius:10px 10px 0 0; }
.r-store-name { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--warm); }
.r-store-sub { font-size:0.6rem; letter-spacing:0.2em; color:rgba(255,255,255,0.38); text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:0.45rem; }
.r-meta-row { display:flex; justify-content:space-between; font-size:0.7rem; color:rgba(255,255,255,0.55); font-family:'DM Mono',monospace; }
.r-cust-row { display:flex; gap:1rem; font-size:0.74rem; color:rgba(255,255,255,0.8); margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid rgba(255,255,255,0.1); flex-wrap:wrap; }
.r-items-hdr { display:grid; grid-template-columns:1fr 36px 70px 70px; gap:0.3rem; padding:0.4rem 0.75rem; background:var(--cream); font-size:0.65rem; font-family:'DM Mono',monospace; letter-spacing:0.08em; text-transform:uppercase; color:#888; }
.r-items { border:1px solid var(--border); border-top:none; border-bottom:none; }
.r-item { display:flex; align-items:flex-start; gap:0.5rem; padding:0.5rem 0.75rem; border-bottom:1px solid #f0ece4; }
.r-item-left { flex:1; min-width:0; }
.r-item-name { font-size:0.8rem; font-weight:600; color:var(--ink); line-height:1.3; }
.r-item-detail { font-size:0.64rem; color:#aaa; font-family:'DM Mono',monospace; margin-top:1px; }
.r-disc-tag { background:#e8f5ee; color:var(--green); font-size:0.58rem; padding:1px 4px; border-radius:4px; margin-left:4px; font-family:'DM Mono',monospace; }
.r-item-total { font-family:'DM Mono',monospace; font-size:0.82rem; font-weight:700; color:var(--ink); min-width:64px; text-align:right; white-space:nowrap; }
.r-totals { padding:0.5rem 0.75rem; border:1px solid var(--border); border-top:none; background:var(--light); }
.r-row { display:flex; justify-content:space-between; font-size:0.76rem; padding:0.15rem 0; color:#666; }
.r-row.green { color:var(--green); font-weight:500; }
.r-grand { display:flex; justify-content:space-between; align-items:center; background:var(--ink); color:white; padding:0.85rem 1.1rem; border-radius:0 0 10px 10px; margin-bottom:0.65rem; }
.r-grand span:first-child { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.14em; text-transform:uppercase; opacity:0.65; }
.r-grand span:last-child { font-family:'Playfair Display',serif; font-size:1.45rem; color:var(--warm); }
.r-footer { text-align:center; font-size:0.68rem; color:#bbb; padding:0.2rem 0 0.5rem; }
.receipt-action-btns { display:flex; gap:0.5rem; margin-top:0.3rem; }
.receipt-action-btns button { flex:1; padding:0.72rem; border:none; border-radius:10px; font-size:0.82rem; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600; }
.btn-pdf { background:var(--ink); color:white; }
.btn-print { background:var(--cream); color:var(--ink); }
.btn-close { background:#f0ece4; color:var(--ink); }

/* Toast */
#appToast { position:fixed; bottom:calc(var(--nav-h) + 14px); left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:0.55rem 1.1rem; border-radius:20px; font-size:0.8rem; font-family:'DM Sans',sans-serif; font-weight:600; z-index:9999; pointer-events:none; transition:opacity 0.3s; box-shadow:0 4px 16px rgba(0,0,0,0.3); white-space:nowrap; opacity:0; }

/* ══════════════════════════
   PRINT STYLES — crisp & dark
══════════════════════════ */
@media print {
  @page { size:A5 portrait; margin:8mm; }
  body > * { display:none !important; }
  .modal-overlay.open { display:block !important; background:none !important; position:static !important; }
  .receipt-modal { border-radius:0; padding:0; box-shadow:none; max-height:none; max-width:100%; }
  .receipt-action-btns, .modal-handle { display:none !important; }
  /* Force black ink */
  .r-header { background:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .r-grand { background:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .r-store-name { color:#c8a96e !important; }
  .r-grand span:last-child { color:#c8a96e !important; }
  .r-item-name, .r-item-total { color:#000 !important; font-weight:700 !important; }
  .r-row { color:#333 !important; }
  .r-item-detail { color:#555 !important; }
  .r-totals { background:#f5f5f5 !important; }
  .r-items-hdr { background:#e0e0e0 !important; color:#333 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="logo">∞ Infinity <small>Stationery Store</small></div>
  <div class="header-right">
    <span id="clock"></span>
  </div>
</header>

<!-- ═══ BILLING PAGE ═══ -->
<div id="page-bill" class="page active">

  <!-- Quick Add Form -->
  <div class="bill-form-area">
    <div class="bill-form-title">+ Add item to bill</div>
    <div class="bill-main-row">
      <input class="bill-name-inp" type="text" id="itemName" placeholder="Item name (e.g. Classmate Notebook 172pg)" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')addItem()">
      <button class="add-item-btn" onclick="addItem()" title="Add item">+</button>
    </div>
    <div class="bill-num-row">
      <div class="num-field">
        <span class="num-label">Price ₹</span>
        <input class="num-inp" type="number" id="itemPrice" placeholder="0.00" min="0" step="0.01" inputmode="decimal" onkeydown="if(event.key==='Enter')addItem()">
      </div>
      <div class="num-field">
        <span class="num-label">Qty</span>
        <input class="num-inp" type="number" id="itemQty" placeholder="1" min="1" value="1" inputmode="numeric" onkeydown="if(event.key==='Enter')addItem()">
      </div>
      <div class="num-field">
        <span class="num-label">Disc %</span>
        <input class="num-inp" type="number" id="itemDisc" placeholder="0" min="0" max="100" inputmode="decimal" onkeydown="if(event.key==='Enter')addItem()">
      </div>
    </div>
  </div>

  <!-- Cart items -->
  <div class="cart-scroll" id="cartScroll">
    <div class="cart-empty" id="cartEmpty">
      <div class="big-icon">🧾</div>
      <p>Bill is empty</p>
      <p class="sub">Type an item above and tap +</p>
    </div>
  </div>

  <!-- Footer: customer + discount + total + checkout -->
  <div class="bill-footer">
    <div class="footer-top-row">
      <input type="text" id="custName" placeholder="👤 Customer name (optional)" autocomplete="off">
      <input type="tel" id="custPhone" placeholder="📞 Phone" inputmode="numeric" maxlength="10" style="max-width:130px;">
    </div>
    <div class="footer-disc-row">
      <input type="number" id="billDiscPct" placeholder="Bill discount %" min="0" max="100" oninput="renderTotals()" inputmode="decimal">
      <span class="sep">% or</span>
      <input type="number" id="billDiscFlat" placeholder="₹ flat off" min="0" oninput="renderTotals()" inputmode="decimal">
    </div>
    <div class="totals-mini" id="totalsSection"></div>
    <button class="bill-btn" id="billBtn" onclick="completeSale()" disabled>✓ Generate Bill</button>
  </div>
</div>

<!-- ═══ REPORTS PAGE ═══ -->
<div id="page-rep" class="page rep-page" style="display:none;">
  <div class="stats-grid">
    <div class="stat-card g"><div class="stat-label">Today Revenue</div><div class="stat-val" id="rToday">₹0</div></div>
    <div class="stat-card a"><div class="stat-label">Transactions</div><div class="stat-val" id="rTxns">0</div></div>
    <div class="stat-card b"><div class="stat-label">Items Sold</div><div class="stat-val" id="rItems">0</div></div>
    <div class="stat-card"><div class="stat-label">Avg Sale</div><div class="stat-val" id="rAvg">₹0</div></div>
  </div>
  <div class="history-section">
    <div class="history-title">Transaction History</div>
    <div id="saleHistory"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-bill" onclick="showPage('bill')">
    <span class="nav-icon">🧾</span>
    <span class="nav-label">Bill</span>
  </button>
  <button class="nav-item" id="nav-rep" onclick="showPage('rep')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Reports</span>
  </button>
</nav>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="receipt-modal">
    <div class="modal-handle"></div>
    <div id="receiptContent"></div>
    <div class="receipt-action-btns">
      <button class="btn-pdf" onclick="downloadPDF(currentSale)">⬇ PDF</button>
      <button class="btn-print" onclick="window.print()">🖨 Print</button>
      <button class="btn-close" onclick="closeReceipt()">+ New Bill</button>
    </div>
  </div>
</div>

<div id="appToast"></div>

<script>
// ── STATE ──
let cart = [];
let sales = JSON.parse(localStorage.getItem('infinity_sales') || '[]');
let currentSale = null;
let activePage = 'bill';

// ── CLOCK ──
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}
updateClock(); setInterval(updateClock, 1000);

// ── NAV ──
function showPage(page) {
  activePage = page;
  ['bill','rep'].forEach(p => {
    const el = document.getElementById('page-' + p);
    if (p === 'bill') { el.style.display = page === 'bill' ? 'flex' : 'none'; }
    else { el.style.display = page === p ? 'block' : 'none'; }
    document.getElementById('nav-' + p).classList.toggle('active', p === page);
  });
  if (page === 'rep') renderReports();
}

// ── ADD ITEM ──
function addItem() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value) || 0;
  const qty = parseInt(document.getElementById('itemQty').value) || 1;
  const disc = Math.min(100, Math.max(0, parseFloat(document.getElementById('itemDisc').value) || 0));

  if (!name) { showToast('⚠ Enter item name'); document.getElementById('itemName').focus(); return; }
  if (price <= 0) { showToast('⚠ Enter item price'); document.getElementById('itemPrice').focus(); return; }

  // Check if same name+price already in cart — if so, just add qty
  const existing = cart.find(i => i.name.toLowerCase() === name.toLowerCase() && i.price === price && i.discount === disc);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({ id: Date.now(), name, price, qty, discount: disc });
  }

  // Clear inputs
  document.getElementById('itemName').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('itemQty').value = '1';
  document.getElementById('itemDisc').value = '';
  document.getElementById('itemName').focus();

  renderCart();
  renderTotals();
  showToast('✓ Added: ' + name);
}

// ── REMOVE ──
function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
  renderTotals();
}

// ── CHANGE QTY ──
function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderCart();
  renderTotals();
}

// ── RENDER CART ──
function renderCart() {
  const scroll = document.getElementById('cartScroll');
  const empty = document.getElementById('cartEmpty');
  document.getElementById('billBtn').disabled = cart.length === 0;

  if (cart.length === 0) {
    scroll.innerHTML = '';
    const e = document.createElement('div');
    e.className = 'cart-empty'; e.id = 'cartEmpty';
    e.innerHTML = '<div class="big-icon">🧾</div><p>Bill is empty</p><p class="sub">Type an item above and tap +</p>';
    scroll.appendChild(e);
    return;
  }

  scroll.innerHTML = cart.map((item, idx) => {
    const lt = item.price * item.qty * (1 - (item.discount || 0) / 100);
    const discLabel = item.discount > 0 ? `<span class="ci-disc-badge">${item.discount}% off</span>` : '';
    return `<div class="cart-item">
      <span class="ci-num">${idx + 1}</span>
      <div class="ci-body">
        <div class="ci-name">${item.name}${discLabel}</div>
        <div class="ci-meta">₹${item.price.toFixed(2)} × ${item.qty}${item.discount > 0 ? ' · saved ₹' + (item.price * item.qty * item.discount / 100).toFixed(2) : ''}</div>
      </div>
      <div class="ci-right">
        <span class="ci-total">₹${lt.toFixed(2)}</span>
        <div style="display:flex;gap:0.3rem;align-items:center;">
          <button onclick="changeQty(${item.id},-1)" style="width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:0.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;">−</button>
          <span style="font-family:'DM Mono',monospace;font-size:0.82rem;font-weight:700;min-width:18px;text-align:center;">${item.qty}</span>
          <button onclick="changeQty(${item.id},1)" style="width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:0.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;">+</button>
        </div>
      </div>
      <button class="ci-del" onclick="removeItem(${item.id})">✕</button>
    </div>`;
  }).join('');
}

// ── RENDER TOTALS ──
function renderTotals() {
  const gross = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const itemDisc = cart.reduce((s, i) => s + i.price * i.qty * (i.discount || 0) / 100, 0);
  const sub = gross - itemDisc;
  const ePct = parseFloat(document.getElementById('billDiscPct').value) || 0;
  const eFlat = parseFloat(document.getElementById('billDiscFlat').value) || 0;
  const eAmt = Math.min(sub, sub * ePct / 100 + eFlat);
  const total = sub - eAmt;

  let html = '';
  if (cart.length === 0) { document.getElementById('totalsSection').innerHTML = ''; return; }

  html += `<div class="t-row"><span>Subtotal</span><span>₹${sub.toFixed(2)}</span></div>`;
  if (eAmt > 0) {
    let lbl = 'Discount';
    if (ePct > 0 && eFlat > 0) lbl += ` (${ePct}% + ₹${eFlat})`;
    else if (ePct > 0) lbl += ` (${ePct}%)`;
    else lbl += ` (₹${eFlat} flat)`;
    html += `<div class="t-row disc"><span>${lbl}</span><span>−₹${eAmt.toFixed(2)}</span></div>`;
  }
  html += `<div class="t-row grand"><span>Total</span><span>₹${total.toFixed(2)}</span></div>`;
  document.getElementById('totalsSection').innerHTML = html;
}

// ── COMPLETE SALE ──
function completeSale() {
  if (cart.length === 0) return;
  const custName = document.getElementById('custName').value.trim();
  const custPhone = document.getElementById('custPhone').value.trim();
  const gross = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const itemDisc = cart.reduce((s, i) => s + i.price * i.qty * (i.discount || 0) / 100, 0);
  const sub = gross - itemDisc;
  const ePct = parseFloat(document.getElementById('billDiscPct').value) || 0;
  const eFlat = parseFloat(document.getElementById('billDiscFlat').value) || 0;
  const eAmt = Math.min(sub, sub * ePct / 100 + eFlat);
  const total = sub - eAmt;
  const saleId = 'INF-' + String(sales.length + 1).padStart(4, '0');

  const sale = {
    id: saleId,
    date: new Date().toISOString(),
    custName, custPhone,
    items: cart.map(i => ({ ...i })),
    grossSubtotal: gross,
    itemDiscTotal: itemDisc,
    subtotal: sub,
    extraPct: ePct,
    extraFlat: eFlat,
    extraDiscAmt: eAmt,
    total
  };

  sales.unshift(sale);
  localStorage.setItem('infinity_sales', JSON.stringify(sales));
  currentSale = sale;
  showReceipt(sale);
  downloadPDF(sale);
}

// ── RESET BILL ──
function resetBill() {
  cart = [];
  document.getElementById('custName').value = '';
  document.getElementById('custPhone').value = '';
  document.getElementById('billDiscPct').value = '';
  document.getElementById('billDiscFlat').value = '';
  renderCart();
  renderTotals();
  document.getElementById('itemName').focus();
}

// ── RECEIPT MODAL ──
function showReceipt(sale) {
  const now = new Date(sale.date);
  const ds = now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
  const ts = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});

  const itemsHtml = sale.items.map((item, idx) => {
    const d = item.discount || 0;
    const lt = item.price * item.qty * (1 - d / 100);
    return `<div class="r-item" style="background:${idx % 2 === 0 ? '#faf7f2' : 'white'};">
      <div class="r-item-left">
        <div class="r-item-name">${item.name}${d > 0 ? `<span class="r-disc-tag">${d}% off</span>` : ''}</div>
        <div class="r-item-detail">x${item.qty} @ ₹${item.price.toFixed(2)}</div>
      </div>
      <div class="r-item-total">₹${lt.toFixed(2)}</div>
    </div>`;
  }).join('');

  const idr = (sale.itemDiscTotal || 0) > 0
    ? `<div class="r-row green"><span>Item Discounts</span><span>−₹${sale.itemDiscTotal.toFixed(2)}</span></div>` : '';
  const subRow = (sale.itemDiscTotal || 0) > 0
    ? `<div class="r-row"><span>Subtotal</span><span>₹${sale.subtotal.toFixed(2)}</span></div>` : '';
  let eLabel = 'Bill Discount';
  if ((sale.extraPct || 0) > 0 && (sale.extraFlat || 0) > 0) eLabel += ` (${sale.extraPct}%+₹${sale.extraFlat})`;
  else if ((sale.extraPct || 0) > 0) eLabel += ` (${sale.extraPct}%)`;
  else if ((sale.extraFlat || 0) > 0) eLabel += ` (₹${sale.extraFlat} flat)`;
  const edr = (sale.extraDiscAmt || 0) > 0
    ? `<div class="r-row green"><span>${eLabel}</span><span>−₹${sale.extraDiscAmt.toFixed(2)}</span></div>` : '';

  document.getElementById('receiptContent').innerHTML = `
    <div class="receipt">
      <div class="r-header">
        <div class="r-store-name">∞ Infinity Store</div>
        <div class="r-store-sub">Stationery Store</div>
        <div class="r-meta-row">
          <span>📅 ${ds} &nbsp;🕐 ${ts}</span>
          <span style="font-weight:700;">${sale.id}</span>
        </div>
        ${(sale.custName || sale.custPhone) ? `
        <div class="r-cust-row">
          ${sale.custName ? `<span>👤 ${sale.custName}</span>` : ''}
          ${sale.custPhone ? `<span>📞 ${sale.custPhone}</span>` : ''}
        </div>` : ''}
      </div>
      <div class="r-items-hdr"><span>Item</span><span>Qty</span><span>Rate</span><span style="text-align:right;">Amt</span></div>
      <div class="r-items">${itemsHtml}</div>
      <div class="r-totals">
        <div class="r-row"><span>Gross Total</span><span>₹${sale.grossSubtotal.toFixed(2)}</span></div>
        ${idr}${subRow}${edr}
      </div>
      <div class="r-grand">
        <span>TOTAL</span>
        <span>₹${sale.total.toFixed(2)}</span>
      </div>
      <div class="r-footer">
        <div>★ Thank you for shopping at Infinity Store! ★</div>
        <div style="margin-top:3px;font-size:0.63rem;">Please keep this receipt for future reference.</div>
      </div>
    </div>`;

  document.getElementById('receiptModal').classList.add('open');
}

function closeReceipt() {
  document.getElementById('receiptModal').classList.remove('open');
  resetBill();
}

// ── PDF DOWNLOAD ──
function downloadPDF(sale) {
  if (!window.jspdf) return;
  const { jsPDF } = window.jspdf;
  const W = 148, doc = new jsPDF({ unit:'mm', format:[W, 210], orientation:'portrait' });
  const now = new Date(sale.date);
  const ds = now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
  const ts = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  const lm = 11, rm = W - 11, mid = W / 2;
  let y = 14;

  // Header bar
  doc.setFillColor(26, 18, 8);
  doc.rect(0, 0, W, 28, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.setTextColor(200, 169, 110);
  doc.text('∞ Infinity Store', mid, 11.5, {align:'center'});
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(180, 180, 180);
  doc.text('STATIONERY STORE', mid, 18, {align:'center'});
  doc.setFontSize(7.5);
  doc.setTextColor(140, 140, 140);
  doc.text(`${ds}   ${ts}`, mid, 24.5, {align:'center'});
  y = 34;

  // Meta
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(100, 100, 100);
  doc.text('Receipt:', lm, y);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(26, 18, 8);
  doc.text(sale.id, lm + 22, y);
  y += 6;
  if (sale.custName) {
    doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 100, 100);
    doc.text('Customer:', lm, y);
    doc.setFont('helvetica', 'bold'); doc.setTextColor(26, 18, 8);
    doc.text(sale.custName, lm + 22, y); y += 5.5;
  }
  if (sale.custPhone) {
    doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 100, 100);
    doc.text('Phone:', lm, y);
    doc.setFont('helvetica', 'bold'); doc.setTextColor(26, 18, 8);
    doc.text(sale.custPhone, lm + 22, y); y += 5.5;
  }
  y += 2;

  // Divider
  doc.setDrawColor(180, 160, 130);
  doc.setLineWidth(0.3);
  doc.setLineDashPattern([2, 2], 0);
  doc.line(lm, y, rm, y);
  y += 5;

  // Table header
  doc.setFillColor(235, 228, 214);
  doc.rect(lm, y - 3.5, rm - lm, 8, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(80, 60, 30);
  doc.text('ITEM', lm + 2, y + 1);
  doc.text('QTY', mid - 8, y + 1, {align:'center'});
  doc.text('RATE', mid + 14, y + 1, {align:'center'});
  doc.text('AMOUNT', rm - 2, y + 1, {align:'right'});
  y += 9;

  // Items
  doc.setLineDashPattern([], 0);
  doc.setDrawColor(220, 210, 195);
  doc.setLineWidth(0.2);

  sale.items.forEach((item, idx) => {
    const d = item.discount || 0;
    const lt = item.price * item.qty * (1 - d / 100);
    if (idx % 2 === 0) { doc.setFillColor(252, 249, 244); doc.rect(lm, y - 3.5, rm - lm, 9, 'F'); }
    const nameLines = doc.splitTextToSize(item.name, 65);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(26, 18, 8);
    nameLines.forEach((line, li) => doc.text(line, lm + 2, y + li * 4));
    const nameH = nameLines.length * 4;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(60, 60, 60);
    doc.text(String(item.qty), mid - 8, y, {align:'center'});
    doc.text('Rs.' + item.price.toFixed(2), mid + 14, y, {align:'center'});
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(26, 18, 8);
    doc.text('Rs.' + lt.toFixed(2), rm - 2, y, {align:'right'});
    if (d > 0) {
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(7);
      doc.setTextColor(50, 130, 90);
      doc.text(`  ${d}% discount applied`, lm + 2, y + nameH);
      y += 4;
    }
    y += nameH + 3;
    doc.setDrawColor(220, 210, 195);
    doc.line(lm, y - 0.5, rm, y - 0.5);
  });
  y += 5;

  // Totals
  const tRow = (label, value, bold = false, color = [80, 80, 80]) => {
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...color);
    doc.text(label, lm + 2, y);
    doc.text(value, rm - 2, y, {align:'right'});
    y += 5.5;
  };

  doc.setLineDashPattern([2, 2], 0);
  doc.setDrawColor(190, 170, 140);
  doc.line(lm, y - 2, rm, y - 2);
  y += 2;

  tRow('Gross Total', 'Rs.' + sale.grossSubtotal.toFixed(2), false, [50, 50, 50]);
  if ((sale.itemDiscTotal || 0) > 0) tRow('Item Discounts', '-Rs.' + sale.itemDiscTotal.toFixed(2), false, [40, 120, 80]);
  if ((sale.itemDiscTotal || 0) > 0) tRow('Subtotal', 'Rs.' + sale.subtotal.toFixed(2), false, [50, 50, 50]);
  if ((sale.extraDiscAmt || 0) > 0) {
    let lbl = 'Bill Discount';
    if ((sale.extraPct || 0) > 0 && (sale.extraFlat || 0) > 0) lbl += ` (${sale.extraPct}%+Rs.${sale.extraFlat})`;
    else if ((sale.extraPct || 0) > 0) lbl += ` (${sale.extraPct}%)`;
    else lbl += ` (Rs.${sale.extraFlat} flat)`;
    tRow(lbl, '-Rs.' + sale.extraDiscAmt.toFixed(2), false, [40, 120, 80]);
  }
  y += 2;

  // Grand total box
  doc.setFillColor(26, 18, 8);
  doc.roundedRect(lm, y - 4, rm - lm, 13, 2.5, 2.5, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(255, 255, 255);
  doc.text('TOTAL', lm + 5, y + 5);
  doc.setFontSize(14);
  doc.setTextColor(200, 169, 110);
  doc.text('Rs.' + sale.total.toFixed(2), rm - 5, y + 5.5, {align:'right'});
  y += 18;

  // Footer
  doc.setLineDashPattern([2, 2], 0);
  doc.setDrawColor(190, 170, 140);
  doc.line(lm, y - 2, rm, y - 2);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(140, 120, 90);
  doc.text('Thank you for shopping at Infinity Store!', mid, y + 4, {align:'center'});
  doc.setFontSize(7.5);
  doc.setTextColor(170, 155, 135);
  doc.text('Please keep this receipt for future reference.', mid, y + 9, {align:'center'});

  doc.save(`Infinity-${sale.id}-${ds.replace(/ /g, '-')}.pdf`);
}

// ── REPORTS ──
function renderReports() {
  const today = new Date().toDateString();
  const todaySales = sales.filter(s => new Date(s.date).toDateString() === today);
  const todayRev = todaySales.reduce((s, t) => s + t.total, 0);
  const totalItems = sales.reduce((s, t) => s + t.items.reduce((a, i) => a + i.qty, 0), 0);
  const avg = sales.length > 0 ? sales.reduce((s, t) => s + t.total, 0) / sales.length : 0;
  document.getElementById('rToday').textContent = '₹' + todayRev.toFixed(0);
  document.getElementById('rTxns').textContent = sales.length;
  document.getElementById('rItems').textContent = totalItems;
  document.getElementById('rAvg').textContent = '₹' + avg.toFixed(0);

  const hist = document.getElementById('saleHistory');
  if (!sales.length) { hist.innerHTML = '<div class="no-sales">No sales yet</div>'; return; }
  hist.innerHTML = sales.map((s, idx) => {
    const d = new Date(s.date);
    return `<div class="sale-card">
      <div class="sale-card-top">
        <span class="sale-id">${s.id}</span>
        <span class="sale-total-amt">₹${s.total.toFixed(2)}</span>
      </div>
      <div class="sale-time">${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} ${d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
      ${(s.custName || s.custPhone) ? `<div style="font-size:0.68rem;color:#888;margin:0.15rem 0;">👤 ${s.custName||''} ${s.custPhone?'📞 '+s.custPhone:''}</div>` : ''}
      <div class="sale-items-list">${s.items.map(i => i.name + ' ×' + i.qty).join(', ')}</div>
      <button class="sale-reprint-btn" onclick="currentSale=sales[${idx}];showReceipt(sales[${idx}])">📋 View / Reprint</button>
    </div>`;
  }).join('');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('appToast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2500);
}

// ── INIT ──
renderCart();
renderTotals();
document.getElementById('itemName').focus();
</script>
</body>
</html>
